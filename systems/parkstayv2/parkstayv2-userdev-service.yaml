apiVersion: v1
kind: Service
metadata:
  name: {{system}}-userdev
spec:
  selector:
    workload.user.cattle.io/workloadselector: apps.deployment-{{namespace}}-{{system}}-userdev
  ports:
    - name: http 
      protocol: TCP
      port: 7010
      targetPort: 8080
    - name: development
      protocol: TCP
      port: 9091
      targetPort: 9091
